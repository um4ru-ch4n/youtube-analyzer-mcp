services:
  mcp-server:
    build: .
    volumes:
      - shared-data:/data
    environment:
      - TRANSPORT_MODE=http
      - HTTP_PORT=39280
      - LOG_LEVEL=debug
      - APP_ENV=development
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - YTDLP_COOKIES=/data/cookies.txt
    ports:
      - "39280:39280"
    # depends_on removed — start immediately, sidecars connect when ready

  whisper:
    build: ./sidecar/whisper
    volumes:
      - shared-data:/data
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3-turbo}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}

  clip:
    build: ./sidecar/clip
    volumes:
      - shared-data:/data
    environment:
      - CLIP_MODEL=${CLIP_MODEL:-openai/clip-vit-large-patch14}

  ocr:
    build: ./sidecar/ocr
    volumes:
      - shared-data:/data
    environment:
      - OCR_LANGUAGES=${OCR_LANGUAGES:-en,ru}

  ollama:
    image: ollama/ollama
    volumes:
      - ollama-models:/root/.ollama
      - shared-data:/data
    ports:
      - "11434:11434"

volumes:
  shared-data:
  ollama-models:
