services:
  mcp-server:
    build: .
    volumes:
      - shared-data:/data
    environment:
      - TRANSPORT_MODE=${TRANSPORT_MODE:-http}
      - HTTP_PORT=${HTTP_PORT:-3000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - APP_ENV=${APP_ENV:-production}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    ports:
      - "${HTTP_PORT:-3000}:3000"
    depends_on:
      - whisper
      - clip
      - ollama

  whisper:
    build: ./sidecar/whisper
    volumes:
      - shared-data:/data
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3-turbo}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}

  clip:
    build: ./sidecar/clip
    volumes:
      - shared-data:/data
    environment:
      - CLIP_MODEL=${CLIP_MODEL:-openai/clip-vit-large-patch14}

  ollama:
    image: ollama/ollama
    volumes:
      - ollama-models:/root/.ollama
      - shared-data:/data
    ports:
      - "11434:11434"

volumes:
  shared-data:
  ollama-models:
